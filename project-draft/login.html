<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Benjamin Han, Lexie Woo, Varnika Dokka, Varsha Venkatesan">
    <meta name="description" content="Sign in to NeuroLearn to access your account and information">
    <title>NeuroLearn - Login</title> 
    <link rel="icon" href="img/fav.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="mobile-container app-page">
        <header class="header">
            <h1>NeuroLearn</h1>
            <h2>Login</h2>
        </header>

        <main class="content">
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input id="email" type="email" class="form-input" placeholder="Enter your Email">
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input id="password" type="password" class="form-input" placeholder="Enter your Password">
            </div>

            <button class="btn" type="submit">Sign In</button>
            <div class ="forgot-password">
                <a href="#">Forgot Password?</a>
            </div>
        </main>

        <footer class="site-footer">
            <p> &copy; 2026 NeuroLink</p>
        </footer>
    </div>
</body>
</html>
