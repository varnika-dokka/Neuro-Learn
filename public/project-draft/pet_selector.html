<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="NeuroLearn pet shop for users to buy their avatars.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pet Selector</title>
    <link rel="icon" href="img/fav.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="site-header">
        <h1>NeuroLearn</h1>
        <h2>Pet Shop</h2>
          <nav>
            <a href="index.html">Home</a>
            <a href="leaderboard.html">Leaderboard</a>
            <a href="quizzes.html">Quizzes</a>
            <a href="modules.html">Modules</a>
            <a href="pet_selector.html">Pet Shop</a>
        </nav>
    </header>

    <main>
            <!--points and preview-->
            <section>
                <div class="preview-content">
                    <p>Points: 1859</p>
                    <img src="img/cat.png" alt="cat avatar">
                    <p>Cost: 500</p>
                    <button aria-label="Buy">Buy</button>
                </div>
            </section>

            <!--avatar selection-->
            <section>
                <div class="pets">
                        <div class="pet-card">
                            <img src="img/cat.png" alt="cat avatar">
                        </div>

                        <div class="pet-card-locked">
                            <img src="img/padlock.png" alt="locked avatar">
                        </div>

                        <div class="pet-card-locked">
                            <img src="img/padlock.png" alt="locked avatar">
                        </div>

                        <div class="pet-card-locked">
                            <img src="img/padlock.png" alt="locked avatar">
                        </div>

                        <div class="pet-card-locked">
                            <img src="img/padlock.png" alt="locked avatar">
                        </div>

                        <div class="pet-card-locked">
                            <img src="img/padlock.png" alt="locked avatar">
                        </div>

                        <div class="pet-card-locked">
                            <img src="img/padlock.png" alt="locked avatar">
                        </div>

                        <div class="pet-card-locked">
                            <img src="img/padlock.png" alt="locked avatar">
                        </div>
                </div>
            </section>
    </main>

    <footer class="site-footer">
        <p>© 2026 NeuroLearn</p>
    </footer>
</body>

</html>
